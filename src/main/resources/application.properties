server.port=8080
spring.application.name=codeannotation-backend

# Active provider: deepseek | codex | qwen | placeholder
llm.provider=codex

# DeepSeek config
# Set your key via environment variable DEEPSEEK_API_KEY
deepseek.api-key=sk-348703bd7d034f87a6123b587a4270ac
deepseek.base-url=https://api.deepseek.com
deepseek.model=deepseek-chat

# Codex(OpenAI) config
# Set your key via environment variable OPENAI_API_KEY
codex.api-key=sk-85f3122d71e39da9334d87adb7726249
codex.base-url=https://api.asxs.top/v1
codex.model=gpt-5.3-codex
# Whether to enable reasoning mode
codex.enable-thinking=false

# Qwen(DashScope) config
# Set your key via environment variable DASHSCOPE_API_KEY
qwen.api-key=sk-3a11cc5c307041f480f665ee6b7de6b0
# Model list: https://help.aliyun.com/model-studio/getting-started/models
qwen.model=qwen3.5-flash
# DashScope compatible-mode base URL
qwen.base-url=https://dashscope.aliyuncs.com/compatible-mode/v1
# 思考模式
qwen.enable-thinking=false

# METEOR config
# python: use Python NLTK METEOR with synonym matching, java: fallback Java implementation
meteor.mode=python
meteor.python.command="C:/Program Files/Python312/python.exe"
meteor.python.script=scripts/meteor_batch.py
meteor.python.timeout-ms=120000
meteor.python.site-packages=.meteor-py/site-packages
